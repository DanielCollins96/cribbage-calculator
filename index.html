<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cribbage Calculator - Find the Best Discard | CribbageCalc.com</title>
    <meta name="description" content="Free cribbage discard calculator for 2, 3, and 4 player games. Compare every keep and discard option by hand average, crib average, net score, and cut card.">
    <meta name="google-site-verification" content="5OoHDoFVTdLB0UVUNgudNjIbDy4O5wqkAOevDPllLKs">
    <meta name="robots" content="index,follow">
    <meta name="theme-color" content="#0f766e">
    <link rel="canonical" href="https://cribbagecalc.com/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CribbageCalc.com">
    <meta property="og:title" content="Cribbage Calculator - Find the Best Discard">
    <meta property="og:description" content="Compare cribbage discard choices by expected hand score, crib value, net points, and optional cut card.">
    <meta property="og:url" content="https://cribbagecalc.com/">
    <meta property="og:image" content="https://cribbagecalc.com/docs/social-preview.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Cribbage Calculator - Find the Best Discard">
    <meta name="twitter:description" content="Free cribbage discard calculator for 2, 3, and 4 player games.">
    <meta name="twitter:image" content="https://cribbagecalc.com/docs/social-preview.png">
    <link rel="stylesheet" href="styles.css">
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://cribbagecalc.com/#website",
            "url": "https://cribbagecalc.com/",
            "name": "CribbageCalc.com",
            "description": "A free cribbage calculator for comparing discard choices and expected cribbage hand value.",
            "inLanguage": "en"
          },
          {
            "@type": "SoftwareApplication",
            "@id": "https://cribbagecalc.com/#app",
            "name": "Cribbage Calculator",
            "applicationCategory": "GameApplication",
            "operatingSystem": "Any",
            "url": "https://cribbagecalc.com/",
            "isAccessibleForFree": true,
            "description": "Browser-based cribbage discard calculator that compares hand average, crib average, net score, and cut card outcomes for 2, 3, and 4 player cribbage.",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <main class="app">
      <div class="topPanel">
        <section class="toolbar">
          <div>
            <h1>Cribbage Calculator</h1>
            <p id="dealHint">Choose your dealt cards to compare discard options.</p>
          </div>
          <div class="toolbarActions">
            <button id="randomDealButton" type="button" title="Deal 6 random cards">Random Deal</button>
            <button id="resetButton" type="button" title="Clear all cards">Reset</button>
          </div>
        </section>

        <section class="controls" aria-label="Game settings">
          <label>
            Players
            <select id="playersSelect">
              <option value="2">2 players - 6 cards</option>
              <option value="3">3 players - 5 cards</option>
              <option value="4">4 players - 5 cards</option>
            </select>
          </label>
          <fieldset>
            <legend>Crib</legend>
            <label><input type="radio" name="cribOwner" value="mine" checked> Mine</label>
            <label><input type="radio" name="cribOwner" value="other"> Other</label>
          </fieldset>
          <div class="cutControl">
            <label>
              Cut card
              <select id="starterSelect">
                <option value="">Auto-average all cuts</option>
              </select>
            </label>
            <button id="randomCutButton" type="button" title="Flip a random cut card">Cut Card</button>
          </div>
        </section>

        <section class="selection" aria-live="polite">
          <div>
            <div class="selectionHeader">
              <span class="label">Dealt</span>
              <button id="scanHandButton" class="scanButton" type="button" title="Scan dealt cards from a photo">
                <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                  <path d="M14.5 5 13 3H7L5.5 5H3v15h18V5h-6.5Z"></path>
                  <circle cx="12" cy="12.5" r="4"></circle>
                </svg>
                Scan hand
              </button>
              <input id="scanHandInput" type="file" accept="image/*" capture="environment" hidden>
            </div>
            <div id="dealtCards" class="dealtSlots"></div>
            <div id="scanStatus" class="scanStatus" role="status" aria-live="polite"></div>
          </div>
          <div>
            <span class="label">Cut Card</span>
            <div id="starterCard" class="cardRow empty">No cut card selected</div>
          </div>
        </section>
      </div>

      <section class="results">
        <div class="resultHeader">
          <h2>Discard Options</h2>
          <span id="resultMeta"></span>
        </div>
        <div id="summary" class="summary"></div>
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Keep</th>
                <th>Discard</th>
                <th>Hand avg</th>
                <th>Crib avg</th>
                <th>Net</th>
              </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
    <!-- Cloudflare Web Analytics --><script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "70f47f2f30f94698ab9eb475e47151ad"}'></script><!-- End Cloudflare Web Analytics -->
  </body>
</html>
